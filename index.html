<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #333;
    }

    .card {
      padding: 16px;
      box-sizing: border-box;
      width: 100%;
      height: 100vh;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #777;
      margin-bottom: 12px;
    }

    .summary {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .box {
      background: #f5f5f5;
      border-left: 5px solid #e60000;
      padding: 10px 12px;
      min-width: 150px;
    }

    .box strong {
      display: block;
      font-size: 18px;
      text-transform: capitalize;
    }

    .box span {
      font-size: 12px;
      color: #666;
    }

    canvas {
      width: 100% !important;
      max-height: 260px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="title">CO2 – viikon neuvotteluhuiput</div>
    <div class="subtitle">Sensoridatan perusteella laskettu käyttöaste</div>

    <div class="summary">
      <div class="box">
        <strong id="topDay">Ladataan...</strong>
        <span>Aktiivisin päivä</span>
      </div>

      <div class="box">
        <strong id="topValue">–</strong>
        <span>Korkein CO2</span>
      </div>
    </div>

    <canvas id="co2Chart"></canvas>
  </div>

  <script>
    const CO2_LIMIT = 750;

    // TESTIDATA. Korvaa tämä myöhemmin API-haulla.
    async function loadCo2Data() {
      return [
        { timestamp: "2026-04-20T09:00:00", value: 420 },
        { timestamp: "2026-04-20T10:00:00", value: 780 },
        { timestamp: "2026-04-20T11:00:00", value: 920 },
        { timestamp: "2026-04-21T09:00:00", value: 510 },
        { timestamp: "2026-04-21T10:00:00", value: 690 },
        { timestamp: "2026-04-22T09:00:00", value: 870 },
        { timestamp: "2026-04-22T10:00:00", value: 980 },
        { timestamp: "2026-04-22T11:00:00", value: 1020 },
        { timestamp: "2026-04-23T09:00:00", value: 610 },
        { timestamp: "2026-04-24T09:00:00", value: 760 },
        { timestamp: "2026-04-24T10:00:00", value: 810 }
      ];
    }

    function dayName(timestamp) {
      return new Date(timestamp).toLocaleDateString("fi-FI", {
        weekday: "long"
      });
    }

    function analyze(data) {
      const days = {};

      data.forEach(row => {
        const day = dayName(row.timestamp);

        if (!days[day]) {
          days[day] = {
            day,
            highCount: 0,
            max: 0
          };
        }

        if (row.value >= CO2_LIMIT) {
          days[day].highCount++;
        }

        days[day].max = Math.max(days[day].max, row.value);
      });

      return Object.values(days).sort((a, b) => {
        return b.highCount - a.highCount || b.max - a.max;
      });
    }

    async function render() {
      const data = await loadCo2Data();
      const insight = analyze(data);
      const top = insight[0];

      document.getElementById("topDay").textContent = top ? top.day : "Ei dataa";
      document.getElementById("topValue").textContent = top ? top.max + " ppm" : "–";

      const labels = data.map(row =>
        new Date(row.timestamp).toLocaleString("fi-FI", {
          weekday: "short",
          hour: "2-digit",
          minute: "2-digit"
        })
      );

      const values = data.map(row => row.value);

      new Chart(document.getElementById("co2Chart"), {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "CO2 ppm",
              data: values,
              tension: 0.3
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true
            }
          },
          scales: {
            y: {
              title: {
                display: true,
                text: "CO2 ppm"
              }
            }
          }
        }
      });
    }

    render();
  </script>
</body>
</html>
